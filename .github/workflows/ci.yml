name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  backend-unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    env:
      NODE_ENV: test
      CI: true
      # Add real CI secrets in GitHub if future tests need external services.
      JWT_SECRET: ci-test-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:unit

  frontend-build:
    name: Frontend build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    env:
      CI: true
      # Public Vite vars can be added here or configured as GitHub variables if required.
      VITE_WS_ENABLED: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Vitest
        run: npm run test:run

      - name: Build frontend
        run: npm run build
