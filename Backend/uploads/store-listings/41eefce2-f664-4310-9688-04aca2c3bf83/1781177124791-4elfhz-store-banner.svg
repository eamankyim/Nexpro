<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated online store banner">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a9d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#264653;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e76f51;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4a261;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles pattern -->
  <circle cx="1400" cy="100" r="120" fill="#2a9d8f" opacity="0.08"/>
  <circle cx="1450" cy="400" r="80" fill="#e76f51" opacity="0.08"/>
  <circle cx="150" cy="350" r="100" fill="#f4a261" opacity="0.08"/>
  
  <!-- Shopping basket icon -->
  <g transform="translate(200, 180)">
    <path d="M 0 40 L 10 80 L 90 80 L 100 40 Z" fill="url(#accentGrad)"/>
    <rect x="15" y="80" width="70" height="10" rx="2" fill="#264653"/>
    <path d="M 30 40 L 30 20 Q 30 0 50 0 Q 70 0 70 20 L 70 40" stroke="#264653" stroke-width="3" fill="none"/>
    <circle cx="35" cy="95" r="5" fill="#264653"/>
    <circle cx="65" cy="95" r="5" fill="#264653"/>
  </g>
  
  <!-- Fresh produce icon -->
  <g transform="translate(950, 200)">
    <ellipse cx="50" cy="60" rx="45" ry="40" fill="#e76f51"/>
    <ellipse cx="50" cy="60" rx="35" ry="30" fill="#f4a261"/>
    <path d="M 50 20 Q 45 15 50 10 Q 55 15 50 20" fill="#2a9d8f"/>
    <ellipse cx="40" cy="55" rx="8" ry="12" fill="#e76f51" opacity="0.3"/>
  </g>
  
  <!-- Bottle icon -->
  <g transform="translate(1100, 210)">
    <rect x="35" y="20" width="30" height="15" rx="3" fill="#2a9d8f"/>
    <rect x="30" y="35" width="40" height="60" rx="5" fill="url(#accentGrad)"/>
    <ellipse cx="50" cy="50" rx="12" ry="8" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Box/package icon -->
  <g transform="translate(1250, 200)">
    <rect x="20" y="40" width="60" height="50" fill="#f4a261"/>
    <path d="M 20 40 L 50 25 L 80 40 L 80 90 L 20 90 Z" fill="#e76f51"/>
    <path d="M 50 25 L 50 90" stroke="#264653" stroke-width="2"/>
    <path d="M 20 40 L 80 40" stroke="#264653" stroke-width="2"/>
  </g>
  
  <!-- Main content area -->
  <g transform="translate(400, 150)">
    <!-- Store name -->
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#264653">
      Nexus Ent
    </text>
    
    <!-- Tagline -->
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="28" fill="#2a9d8f">
      Your Trusted Neighborhood Store
    </text>
    
    <!-- Description lines -->
    <text x="0" y="150" font-family="Arial, sans-serif" font-size="20" fill="#495057">
      Quality Groceries • Household Essentials • Personal Care
    </text>
    
    <text x="0" y="185" font-family="Arial, sans-serif" font-size="20" fill="#495057">
      Fresh Products • Affordable Prices • Excellent Service
    </text>
    
    <!-- Call to action button -->
    <g transform="translate(0, 215)">
      <rect width="200" height="50" rx="25" fill="url(#warmGrad)"/>
      <text x="100" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
        Shop Now
      </text>
    </g>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="380" cy="450" r="6" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="410" cy="460" r="4" fill="#e76f51" opacity="0.5"/>
  <circle cx="440" cy="455" r="5" fill="#f4a261" opacity="0.5"/>
  
  <circle cx="1200" cy="80" r="5" fill="#2a9d8f" opacity="0.5"/>
  <circle cx="1230" cy="70" r="4" fill="#e76f51" opacity="0.5"/>
  <circle cx="1260" cy="75" r="6" fill="#f4a261" opacity="0.5"/>
</svg>