<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated online store banner">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a9d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#264653;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e76f51;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4a261;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>
  
  <!-- Decorative pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="#2a9d8f"/>
    <circle cx="1500" cy="400" r="100" fill="#e76f51"/>
    <circle cx="1450" cy="80" r="60" fill="#f4a261"/>
  </g>
  
  <!-- Shopping basket icon -->
  <g transform="translate(200, 180)">
    <path d="M 0 40 L 10 80 L 90 80 L 100 40 Z" fill="url(#warmGrad)"/>
    <rect x="15" y="80" width="15" height="8" rx="4" fill="#264653"/>
    <rect x="70" y="80" width="15" height="8" rx="4" fill="#264653"/>
    <path d="M 30 40 L 30 20 Q 30 0 50 0 Q 70 0 70 20 L 70 40" fill="none" stroke="#264653" stroke-width="3"/>
    <line x1="20" y1="50" x2="25" y2="70" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="50" x2="45" y2="70" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="50" x2="65" y2="70" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="80" y1="50" x2="75" y2="70" stroke="#fff" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Grocery items illustration -->
  <g transform="translate(1250, 200)">
    <!-- Bottle -->
    <rect x="0" y="30" width="40" height="80" rx="5" fill="#2a9d8f"/>
    <rect x="10" y="20" width="20" height="15" rx="3" fill="#264653"/>
    <ellipse cx="20" cy="60" rx="12" ry="8" fill="#fff" opacity="0.3"/>
    
    <!-- Box -->
    <rect x="60" y="40" width="50" height="70" rx="3" fill="#e76f51"/>
    <rect x="65" y="45" width="40" height="25" fill="#fff" opacity="0.3"/>
    <line x1="85" y1="40" x2="85" y2="110" stroke="#264653" stroke-width="2"/>
    
    <!-- Apple -->
    <circle cx="145" cy="80" r="28" fill="#e63946"/>
    <ellipse cx="145" cy="75" rx="10" ry="6" fill="#fff" opacity="0.4"/>
    <path d="M 145 52 Q 140 45 135 48" fill="none" stroke="#2d6a4f" stroke-width="3"/>
    <ellipse cx="140" cy="48" rx="6" ry="4" fill="#2d6a4f"/>
  </g>
  
  <!-- Main content area -->
  <g transform="translate(450, 150)">
    <!-- Store name -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#accentGrad)">
      Nexus Ent
    </text>
    
    <!-- Tagline -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="28" fill="#264653" opacity="0.9">
      Your Neighborhood Store
    </text>
    
    <!-- Description -->
    <text x="0" y="110" font-family="Arial, sans-serif" font-size="18" fill="#495057">
      Quality groceries, household essentials &amp; everyday necessities
    </text>
    
    <!-- Features -->
    <g transform="translate(0, 150)">
      <circle cx="0" cy="-5" r="8" fill="#2a9d8f"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="16" fill="#264653">Fresh Products</text>
      
      <circle cx="180" cy="-5" r="8" fill="#e76f51"/>
      <text x="200" y="0" font-family="Arial, sans-serif" font-size="16" fill="#264653">Affordable Prices</text>
      
      <circle cx="380" cy="-5" r="8" fill="#f4a261"/>
      <text x="400" y="0" font-family="Arial, sans-serif" font-size="16" fill="#264653">Excellent Service</text>
    </g>
  </g>
  
  <!-- Decorative accent bar -->
  <rect x="0" y="480" width="1600" height="20" fill="url(#accentGrad)"/>
  
  <!-- Small decorative elements -->
  <circle cx="400" cy="420" r="5" fill="#2a9d8f" opacity="0.6"/>
  <circle cx="430" cy="430" r="4" fill="#e76f51" opacity="0.6"/>
  <circle cx="460" cy="425" r="6" fill="#f4a261" opacity="0.6"/>
</svg>