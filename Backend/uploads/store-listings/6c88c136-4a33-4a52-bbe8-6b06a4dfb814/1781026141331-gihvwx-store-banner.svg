<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated online store banner">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5f3f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d8659;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5f3f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8c42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#ffffff" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>
  <rect width="1600" height="500" fill="url(#dots)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="100" r="80" fill="#ff8c42" opacity="0.2"/>
  <circle cx="1400" cy="400" r="100" fill="#ffb347" opacity="0.15"/>
  <circle cx="1450" cy="80" r="60" fill="#ffffff" opacity="0.1"/>
  
  <!-- Decorative geometric shapes -->
  <polygon points="100,450 150,400 200,450 150,500" fill="#ff8c42" opacity="0.3"/>
  <polygon points="1500,50 1550,100 1500,150 1450,100" fill="#ffb347" opacity="0.25"/>
  
  <!-- Accent bar -->
  <rect x="0" y="220" width="1600" height="60" fill="url(#accentGrad)" opacity="0.3"/>
  
  <!-- Main content container -->
  <rect x="100" y="150" width="700" height="200" rx="15" fill="#ffffff" opacity="0.95"/>
  
  <!-- Store name -->
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1a5f3f" text-anchor="middle">
    Asempa Fie
  </text>
  
  <!-- Tagline -->
  <text x="450" y="280" font-family="Arial, sans-serif" font-size="28" fill="#ff8c42" text-anchor="middle">
    Quality Products, Trusted Service
  </text>
  
  <!-- Decorative leaf elements -->
  <ellipse cx="950" cy="200" rx="30" ry="50" fill="#2d8659" opacity="0.6" transform="rotate(-20 950 200)"/>
  <ellipse cx="980" cy="210" rx="30" ry="50" fill="#3a9d6a" opacity="0.5" transform="rotate(15 980 210)"/>
  <ellipse cx="1010" cy="200" rx="30" ry="50" fill="#2d8659" opacity="0.6" transform="rotate(-30 1010 200)"/>
  
  <ellipse cx="1100" cy="280" rx="25" ry="45" fill="#3a9d6a" opacity="0.5" transform="rotate(25 1100 280)"/>
  <ellipse cx="1130" cy="270" rx="25" ry="45" fill="#2d8659" opacity="0.6" transform="rotate(-10 1130 270)"/>
  
  <!-- Shopping bag icon -->
  <g transform="translate(1250, 180)">
    <rect x="0" y="20" width="100" height="120" rx="8" fill="#ffffff" opacity="0.9"/>
    <path d="M 20 20 Q 20 -10 50 -10 Q 80 -10 80 20" stroke="#ff8c42" stroke-width="6" fill="none"/>
    <rect x="10" y="30" width="80" height="15" fill="#ff8c42" opacity="0.7"/>
    <rect x="10" y="60" width="80" height="8" fill="#2d8659" opacity="0.5"/>
    <rect x="10" y="80" width="80" height="8" fill="#2d8659" opacity="0.5"/>
  </g>
  
  <!-- Bottom accent wave -->
  <path d="M 0 450 Q 400 420 800 450 T 1600 450 L 1600 500 L 0 500 Z" fill="#ff8c42" opacity="0.2"/>
</svg>