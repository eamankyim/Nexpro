<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated online store banner">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0.9"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#e94560" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>
  <rect width="1600" height="500" fill="url(#dots)"/>
  
  <!-- Decorative circles -->
  <circle cx="1400" cy="100" r="120" fill="#e94560" opacity="0.08"/>
  <circle cx="200" cy="400" r="150" fill="#f39c12" opacity="0.06"/>
  <circle cx="1500" cy="450" r="80" fill="#e94560" opacity="0.1"/>
  
  <!-- Main content container -->
  <rect x="100" y="120" width="700" height="260" rx="12" fill="url(#cardGrad)" opacity="0.6"/>
  
  <!-- Decorative accent bar -->
  <rect x="100" y="120" width="8" height="260" rx="4" fill="url(#accentGrad)"/>
  
  <!-- Store icon/symbol -->
  <g transform="translate(140, 160)">
    <circle cx="40" cy="40" r="45" fill="#e94560" opacity="0.2"/>
    <path d="M 25 25 L 55 25 L 55 55 L 25 55 Z M 30 30 L 30 50 M 40 30 L 40 50 M 50 30 L 50 50" 
          stroke="url(#accentGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="32" y="20" width="16" height="8" fill="url(#accentGrad)" rx="2"/>
  </g>
  
  <!-- Store name -->
  <text x="250" y="215" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" letter-spacing="2">
    Asempa Fie
  </text>
  
  <!-- Tagline -->
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="24" fill="#f39c12" letter-spacing="1">
    Quality Products &amp; Service
  </text>
  
  <!-- Subtitle -->
  <text x="250" y="300" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0" opacity="0.8">
    Your trusted shopping destination
  </text>
  
  <!-- Decorative geometric shapes on right -->
  <g transform="translate(950, 150)">
    <rect x="0" y="0" width="180" height="180" rx="12" fill="#e94560" opacity="0.12"/>
    <rect x="200" y="20" width="140" height="140" rx="10" fill="#f39c12" opacity="0.1"/>
    <rect x="360" y="40" width="120" height="120" rx="8" fill="#e94560" opacity="0.15"/>
    
    <rect x="30" y="50" width="60" height="80" rx="4" fill="url(#accentGrad)" opacity="0.3"/>
    <rect x="100" y="50" width="60" height="80" rx="4" fill="url(#accentGrad)" opacity="0.25"/>
    <circle cx="245" cy="90" r="35" fill="#f39c12" opacity="0.3"/>
    <rect x="385" y="80" width="50" height="40" rx="4" fill="#e94560" opacity="0.4"/>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="100" y="420" width="600" height="4" rx="2" fill="url(#accentGrad)" opacity="0.6"/>
  
  <!-- Small decorative elements -->
  <circle cx="720" cy="422" r="6" fill="#e94560"/>
  <circle cx="740" cy="422" r="6" fill="#f39c12"/>
  <circle cx="760" cy="422" r="6" fill="#e94560"/>
</svg>