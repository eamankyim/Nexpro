<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated online store banner">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tshirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mugGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c92a2a;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#e94560" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>
  <rect width="1600" height="500" fill="url(#dots)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="#e94560" opacity="0.1"/>
  <circle cx="1450" cy="400" r="100" fill="#f39c12" opacity="0.1"/>
  <circle cx="1500" cy="80" r="60" fill="#e94560" opacity="0.08"/>
  
  <!-- T-shirt illustration -->
  <g transform="translate(1100, 180)">
    <path d="M 50 30 L 30 50 L 30 120 L 130 120 L 130 50 L 110 30 L 100 40 L 80 40 L 70 35 Z" 
          fill="url(#tshirtGrad)" stroke="#0f3460" stroke-width="2"/>
    <ellipse cx="80" cy="50" rx="15" ry="20" fill="url(#tshirtGrad)"/>
    <path d="M 60 70 L 70 80 L 90 80 L 100 70" fill="none" stroke="#e94560" stroke-width="3"/>
    <circle cx="70" cy="90" r="3" fill="#f39c12"/>
    <circle cx="90" cy="90" r="3" fill="#f39c12"/>
  </g>
  
  <!-- Mug illustration -->
  <g transform="translate(1280, 200)">
    <rect x="40" y="40" width="80" height="90" rx="5" fill="url(#mugGrad)" stroke="#0f3460" stroke-width="2"/>
    <ellipse cx="80" cy="40" rx="40" ry="8" fill="#ff8787"/>
    <path d="M 120 60 Q 145 60 145 85 Q 145 110 120 110" 
          fill="none" stroke="#0f3460" stroke-width="3"/>
    <rect x="55" y="60" width="50" height="30" rx="3" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Printing press elements -->
  <g transform="translate(950, 250)">
    <rect x="0" y="0" width="100" height="15" rx="3" fill="#e94560"/>
    <rect x="10" y="20" width="20" height="40" rx="2" fill="#f39c12"/>
    <rect x="40" y="20" width="20" height="40" rx="2" fill="#e94560"/>
    <rect x="70" y="20" width="20" height="40" rx="2" fill="#4ecdc4"/>
    <rect x="5" y="65" width="90" height="8" rx="2" fill="#0f3460"/>
  </g>
  
  <!-- Ink drops -->
  <circle cx="1050" cy="320" r="8" fill="#e94560" opacity="0.6"/>
  <circle cx="1075" cy="335" r="6" fill="#f39c12" opacity="0.6"/>
  <circle cx="1095" cy="325" r="7" fill="#4ecdc4" opacity="0.6"/>
  
  <!-- Main content area -->
  <g transform="translate(100, 140)">
    <!-- Company name -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
      Bachor &amp; Jonas LTD
    </text>
    
    <!-- Accent line -->
    <rect x="0" y="20" width="400" height="6" rx="3" fill="url(#accentGrad)"/>
    
    <!-- Tagline -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#f39c12">
      Your #1 Printing Press in Accra
    </text>
    
    <!-- Services -->
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0">
      Premium Printing Services
    </text>
    
    <!-- Service list -->
    <g transform="translate(0, 160)">
      <circle cx="0" cy="-5" r="5" fill="#e94560"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">
        T-Shirts &amp; Apparel
      </text>
    </g>
    
    <g transform="translate(0, 195)">
      <circle cx="0" cy="-5" r="5" fill="#f39c12"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">
        Mugs &amp; Merchandise
      </text>
    </g>
    
    <g transform="translate(0, 230)">
      <circle cx="0" cy="-5" r="5" fill="#4ecdc4"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">
        Custom Printing Solutions
      </text>
    </g>
  </g>
  
  <!-- Decorative print elements -->
  <g opacity="0.15">
    <rect x="50" y="50" width="30" height="30" fill="none" stroke="#e94560" stroke-width="2"/>
    <rect x="50" y="450" width="25" height="25" fill="none" stroke="#f39c12" stroke-width="2"/>
    <circle cx="1550" cy="250" r="20" fill="none" stroke="#4ecdc4" stroke-width="2"/>
  </g>
</svg>