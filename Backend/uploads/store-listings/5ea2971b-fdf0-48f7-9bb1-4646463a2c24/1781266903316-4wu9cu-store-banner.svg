<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated online store banner">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6bcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Main background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>
  <rect width="1600" height="500" fill="url(#dots)"/>
  
  <!-- Decorative geometric shapes -->
  <circle cx="1400" cy="100" r="150" fill="url(#accentGrad)" opacity="0.15"/>
  <circle cx="200" cy="400" r="120" fill="url(#yellowGrad)" opacity="0.12"/>
  <rect x="1200" y="300" width="200" height="200" fill="url(#cyanGrad)" opacity="0.1" transform="rotate(45 1300 400)"/>
  
  <!-- T-shirt icon -->
  <g transform="translate(200, 150)">
    <path d="M 50 20 L 30 20 L 20 30 L 0 25 L 0 50 L 10 55 L 10 100 L 90 100 L 90 55 L 100 50 L 100 25 L 80 30 L 70 20 L 50 20 Z" fill="url(#accentGrad)"/>
    <ellipse cx="50" cy="25" rx="15" ry="8" fill="#1a1a2e"/>
    <rect x="25" y="50" width="50" height="35" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Mug icon -->
  <g transform="translate(1300, 180)">
    <rect x="20" y="30" width="80" height="90" rx="5" fill="url(#cyanGrad)"/>
    <ellipse cx="60" cy="30" rx="40" ry="8" fill="#4facfe"/>
    <path d="M 100 50 Q 130 50 130 75 Q 130 100 100 100" fill="none" stroke="url(#yellowGrad)" stroke-width="8"/>
    <rect x="35" y="50" width="50" height="30" fill="#ffffff" opacity="0.4"/>
  </g>
  
  <!-- Printer icon -->
  <g transform="translate(350, 320)">
    <rect x="10" y="0" width="80" height="20" rx="3" fill="#4a5568"/>
    <rect x="0" y="20" width="100" height="50" rx="5" fill="url(#yellowGrad)"/>
    <rect x="10" y="30" width="80" height="15" fill="#2d3748"/>
    <circle cx="85" cy="40" r="4" fill="#48bb78"/>
    <rect x="15" y="70" width="70" height="40" fill="#ffffff"/>
    <rect x="20" y="75" width="20" height="3" fill="url(#accentGrad)"/>
    <rect x="20" y="82" width="35" height="3" fill="#cbd5e0"/>
    <rect x="20" y="89" width="30" height="3" fill="#cbd5e0"/>
    <rect x="20" y="96" width="25" height="3" fill="#cbd5e0"/>
  </g>
  
  <!-- Ink drops decoration -->
  <circle cx="950" cy="120" r="15" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="980" cy="140" r="12" fill="url(#cyanGrad)" opacity="0.6"/>
  <circle cx="1010" cy="125" r="10" fill="url(#yellowGrad)" opacity="0.6"/>
  
  <!-- Main text content -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#ffffff">
    Bachor &amp; Jonas LTD
  </text>
  
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="32" fill="url(#accentGrad)" font-weight="600">
    Premium Printing Studio
  </text>
  
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="24" fill="#cbd5e0">
    Your #1 Printing Press in Accra
  </text>
  
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="20" fill="#a0aec0">
    T-Shirts • Mugs • Banners • Business Cards &amp; More
  </text>
  
  <!-- Decorative accent line -->
  <rect x="600" y="350" width="120" height="4" rx="2" fill="url(#accentGrad)"/>
  
  <!-- Creative splatter effect -->
  <circle cx="560" cy="200" r="6" fill="url(#yellowGrad)" opacity="0.4"/>
  <circle cx="575" cy="185" r="4" fill="url(#accentGrad)" opacity="0.3"/>
  <circle cx="1150" cy="280" r="5" fill="url(#cyanGrad)" opacity="0.4"/>
  <circle cx="1165" cy="270" r="7" fill="url(#yellowGrad)" opacity="0.3"/>
</svg>