<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/abs-logo-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Viewport meta tag for responsive design and mobile app -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no" />
    <!-- Mobile web app meta tags -->
    <meta name="theme-color" content="#166534" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ABS" />
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <!-- Prevent iOS from auto-detecting phone numbers -->
    <meta name="format-detection" content="telephone=no" />
    <!-- Prevent iOS from auto-detecting addresses -->
    <meta name="format-detection" content="address=no" />
    <!-- PWA description -->
    <meta name="description" content="African Business Suite (ABS) is all-in-one business software for growing African businesses." />
    <meta name="keywords" content="ABS Ghana, African Business Suite, ABS, business management Ghana, POS Ghana, inventory management, shop management, pharmacy management" />
    <meta property="og:title" content="African Business Suite" />
    <meta property="og:description" content="Business management, POS, inventory, invoices, and reports for African businesses." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <title>African Business Suite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
